# Scheduled trigger for the intervals.icu wellness sync — a free stand-in for
# Vercel Cron (which is once-a-day on the Hobby plan). Pings /api/wellness/sync
# on the same 5×/day schedule; the route pulls the recent wellness window and
# upserts wellness_days.
#
# Setup:
#   1. Repo → Settings → Secrets and variables → Actions → New repository secret:
#        CRON_SECRET  = the same value set in Vercel.
#   2. (Optional) add a repository *variable* WELLNESS_SYNC_URL if your production
#        URL isn't https://paceline.run/api/wellness/sync.
#   3. Scheduled workflows only run once this file is on the DEFAULT branch — it
#        starts firing after PR #108 merges to master.
name: Wellness sync

on:
  schedule:
    # UTC. 07/11/15/19/23 = 08:00/12:00/16:00/20:00/00:00 BST — every 4h, no 04:00.
    - cron: '0 7,11,15,19,23 * * *'
  workflow_dispatch: {}   # manual "Run workflow" button for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger wellness sync
        env:
          URL: ${{ vars.WELLNESS_SYNC_URL || 'https://paceline.run/api/wellness/sync' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set — add it in repo Settings → Secrets → Actions"
            exit 1
          fi
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $CRON_SECRET" "$URL")
          echo "POST $URL -> HTTP $code"
          cat /tmp/resp.json; echo
          # Fail the run (and notify) on any non-200 so a broken sync is visible.
          [ "$code" = "200" ]
